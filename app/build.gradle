apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'org.jetbrains.kotlin.android'

repositories {
    maven { url 'https://maven.google.com'
    }
}
android {
    compileSdk 34
    buildToolsVersion = "33.0.1"
    defaultConfig {
        namespace "com.k.deeplinkingtesting"
        minSdkVersion 23
        //noinspection OldTargetApi
        targetSdkVersion 33
        versionCode 95
        versionName "7.2.7"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
        manifestPlaceholders = [izooto_app_id:'aeb7d82c8dcc0bcebc9684c2ad8a4a384980e640']
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    packagingOptions {
        resources.excludes.add("META-INF/*")
    }
    buildFeatures {
       // compose true
        viewBinding true
        }
        compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
dependencies {
    implementation 'com.izooto:android-sdk:2.4.5'


    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.activity:activity:1.8.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    implementation 'com.android.support:multidex:1.0.3'
    implementation platform('com.google.firebase:firebase-bom:32.8.0')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.auth:google-auth-library-oauth2-http:0.26.0'
    //implementation files('libs/izooto-release.aar')
    implementation 'androidx.browser:browser:1.8.0'
    implementation('com.github.bumptech.glide:glide:4.16.0')
    implementation 'com.squareup.okhttp3:okhttp:4.9.1'
    implementation("androidx.credentials:credentials:1.2.1")
    implementation("androidx.credentials:credentials-play-services-auth:1.2.1")
    implementation("com.google.android.libraries.identity.googleid:googleid:1.1.0")
    implementation "androidx.compose.runtime:runtime:1.0.0"
    implementation 'com.github.IntruderShanky:scatter-piechart:1.0.0'

}


